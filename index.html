<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detection of Online Fake News</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    padding:20px;
}

.container{
    width:100%;
    max-width:700px;
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    color:#1e3c72;
    font-size:2rem;
    margin-bottom:10px;
}

.header p{
    color:#666;
    font-size:1rem;
}

label{
    display:block;
    margin-bottom:10px;
    font-weight:600;
    color:#333;
}

textarea{
    width:100%;
    height:180px;
    resize:none;
    border:2px solid #ddd;
    border-radius:12px;
    padding:15px;
    font-size:16px;
    transition:0.3s;
}

textarea:focus{
    outline:none;
    border-color:#2a5298;
    box-shadow:0 0 12px rgba(42,82,152,0.25);
}

.btn{
    width:100%;
    margin-top:25px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(42,82,152,0.3);
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#888;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>📰 Detection of Online Fake News</h1>
        <p>Enter a news statement below and verify its authenticity.</p>
    </div>

    <form action="/detect" method="POST">

        <label>News Statement</label>

        <textarea
            name="statement"
            placeholder="Example: India's Chandrayaan-3 successfully landed near the Moon's south pole..."
            required></textarea>

        <button class="btn" type="submit">
            🔍 Detect News
        </button>

    </form>

    <div class="footer">
        Fake News Detection System
    </div>

</div>

</body>
</html>
