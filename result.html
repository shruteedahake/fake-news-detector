<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detection Result</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    padding:20px;
}

.container{
    width:100%;
    max-width:750px;
    background:white;
    border-radius:20px;
    padding:40px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

h1{
    color:#1e3c72;
    margin-bottom:20px;
}

.statement-box{
    background:#f7f9fc;
    border-left:5px solid #2a5298;
    border-radius:10px;
    padding:20px;
    text-align:left;
    margin:25px 0;
}

.statement-box h3{
    color:#1e3c72;
    margin-bottom:10px;
}

.statement-box p{
    color:#444;
    line-height:1.6;
}

.result{
    margin:25px 0;
    padding:25px;
    border-radius:15px;
    font-size:28px;
    font-weight:bold;
}

.true{
    background:#e8f8ee;
    color:#198754;
}

.fake{
    background:#ffeaea;
    color:#dc3545;
}

.unknown{
    background:#fff4d6;
    color:#b7791f;
}

.btn{
    display:inline-block;
    margin-top:20px;
    text-decoration:none;
    padding:14px 30px;
    border-radius:10px;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
    font-weight:600;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-2px);
}

.info{
    margin-top:15px;
    color:#777;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <h1>📰 Fake News Detection Result</h1>

    <div class="statement-box">
        <h3>Submitted Statement</h3>
        <p>{{ statement }}</p>
    </div>

    {% if result == "True" %}
        <div class="result true">
            ✅ VERIFIED NEWS
        </div>

    {% elif result == "Fake" %}
        <div class="result fake">
            ❌ FAKE NEWS DETECTED
        </div>

    {% else %}
        <div class="result unknown">
            ⚠ NEWS NOT FOUND IN DATASET
        </div>
    {% endif %}

    <div class="info">
        Result generated using the sample news dataset.
    </div>

    <a href="/" class="btn">
        Check Another News
    </a>

</div>

</body>
</html>
